        'hypertext-quote':         '/elves/hypertext-quote.js',
        'hypertext-variable':      '/elves/hypertext-variable.js',
      }

      const loading = new Set()

      function maybeLoad(el) {
        const tag = el.localName
        if (!tag.includes('-')) return
        if (customElements.get(tag) || loading.has(tag) || !ELVES[tag]) return
        loading.add(tag)
        import(ELVES[tag])
      }

      new MutationObserver(mutations => {
        for (const m of mutations)
          for (const node of m.addedNodes) {
            if (node.nodeType !== 1) continue
            maybeLoad(node)
            node.querySelectorAll('*').forEach(maybeLoad)
          }
      }).observe(document, { subtree: true, childList: true })

      document.querySelectorAll('*').forEach(maybeLoad)

    <script>
      if (window.self !== window.top) {
        window.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            event.preventDefault()
            const escapeEvent = new KeyboardEvent('keydown', {
              key: 'Escape',
              code: 'Escape',
              keyCode: 27,
              which: 27,
              bubbles: true,
              cancelable: true
            });
            window.parent.document.dispatchEvent(escapeEvent);
          }
        });
      }
    </script>
