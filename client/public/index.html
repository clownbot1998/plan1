    <main id="main">

    <script>
      if (window.self !== window.top) {
        window.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            event.preventDefault()
            const escapeEvent = new KeyboardEvent('keydown', {
              key: 'Escape',
              code: 'Escape',
              keyCode: 27,
              which: 27,
              bubbles: true,
              cancelable: true
            });
            window.parent.document.dispatchEvent(escapeEvent);
          }
        });
      }
    </script>
