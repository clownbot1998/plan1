services:
  was:
    build:
      context: ../plan98
      dockerfile: docker/Dockerfile.was
    container_name: plan98-was
    restart: always
    ports:
      - "1088:1088"
    environment:
      - CORS_ALLOW_ALL_ORIGINS=true
      - PORT=1088

  multiplayer:
    build:
      context: ../plan98
      dockerfile: docker/Dockerfile.multiplayer
    container_name: plan98-multiplayer
    restart: always
    ports:
      - "9208:9208"

  libretranslate:
    build:
      context: ../plan98
      dockerfile: docker/Dockerfile.libretranslate
    container_name: plan98-libretranslate
    restart: always
    ports:
      - "3005:5000"

  wireguard:
    image: ghcr.io/wg-easy/wg-easy:7
    container_name: plan1-wireguard
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD=${WG_EASY_PASSWORD:-clownbot}
      - WG_DEFAULT_DNS=1.1.1.1,8.8.8.8
      - WG_DEFAULT_ADDRESS=10.13.13.x
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
    volumes:
      - wireguard-data:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

volumes:
  wireguard-data:
